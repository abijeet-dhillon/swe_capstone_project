services:
  backend:
    build: .
    working_dir: /code          
    volumes:
      - .:/code
      - sqlite_data:/code/data
      - ./uploads:/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/code
      - DATABASE_URL=sqlite:///data/app.db
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  sqlite_data: